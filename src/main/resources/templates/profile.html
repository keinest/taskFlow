<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/layout :: head('Mon profil', 'profile.css')}"></head>
<body class="app-body">

<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Mon profil')}"></div>

        <div class="content-inner">
            <div id="profileSuccessMsg" class="update-success hidden">
                ✅ Profil mis à jour avec succès !
            </div>

            <div class="profile-layout">

                <!-- ─── Sidebar Profil ──────────────────── -->
                <aside>
                    <div class="profile-card">
                        <div class="profile-card-hero"></div>
                        <div class="profile-card-body">
                            <div class="profile-avatar-wrap">
                                <div class="profile-avatar-inner">
                                    <div class="profile-avatar-img"
                                         id="profileAvatarDisplay"
                                         th:style="'background:' + ${user.avatarColor}"
                                         th:text="${user.initials}">AB</div>
                                </div>
                            </div>
                            <div class="profile-name" th:text="${user.fullName ?: user.username}" id="profileDisplayName">Alice Martin</div>
                            <div class="profile-username" th:text="'@' + ${user.username}">@alice</div>
                            <div class="profile-role-badge">
                                <span>⚡</span>
                                <span th:text="${user.role}">ADMIN</span>
                            </div>
                            <div class="profile-meta">
                                <div class="profile-meta-item">
                                    <span>📧</span>
                                    <span th:text="${user.email}">votre@email.com</span>
                                </div>
                                <div class="profile-meta-item">
                                    <span>📅</span>
                                    <span>Membre depuis 2024</span>
                                </div>
                            </div>
                            <div class="profile-stats">
                                <div class="profile-stat">
                                    <span class="profile-stat-val" th:text="${stats.totalTasks ?: 0}">0</span>
                                    <span class="profile-stat-label">Tâches</span>
                                </div>
                                <div class="profile-stat">
                                    <span class="profile-stat-val" th:text="${stats.doneTasks ?: 0}">0</span>
                                    <span class="profile-stat-label">Terminées</span>
                                </div>
                                <div class="profile-stat">
                                    <span class="profile-stat-val" th:text="${#lists.size(projects)}">0</span>
                                    <span class="profile-stat-label">Projets</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </aside>

                <!-- ─── Sections Profil ─────────────────── -->
                <div class="profile-sections">

                    <!-- Informations personnelles -->
                    <div class="profile-section">
                        <div class="profile-section-header">
                            <h3><span>👤</span> Informations personnelles</h3>
                            <button class="btn btn-primary btn-sm" onclick="saveProfile()">💾 Enregistrer</button>
                        </div>
                        <div class="profile-section-body">
                            <div class="profile-form-row">
                                <div class="form-group">
                                    <label>Nom complet</label>
                                    <input type="text" id="profileFullName" class="form-input"
                                           th:value="${user.fullName}" placeholder="Alice Martin"/>
                                </div>
                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" id="profileEmail" class="form-input"
                                           th:value="${user.email}" placeholder="votre@email.com"/>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Nom d'utilisateur</label>
                                <input type="text" class="form-input" th:value="${user.username}" disabled
                                       style="opacity:.6; cursor:not-allowed"/>
                                <span class="field-error" style="color:var(--text-4);font-size:11px;">Le nom d'utilisateur ne peut pas être modifié</span>
                            </div>
                            <div class="form-group">
                                <label>Couleur d'avatar</label>
                                <div class="avatar-picker-grid" id="avatarColorPicker">
                                    <div th:each="color : ${ {'#0ea5e9','#06b6d4','#3b82f6','#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#ef4444','#f97316','#14b8a6','#84cc16','#6b7280','#1d4ed8','#7c3aed','#be185d'} }"
                                         class="avatar-color-opt"
                                         th:classappend="${color == user.avatarColor} ? ' selected'"
                                         th:style="'background:' + ${color}"
                                         th:attr="data-color=${color}, onclick='selectAvatarColor(this)'"
                                         th:text="${color == user.avatarColor} ? '✓' : ''">
                                    </div>
                                </div>
                                <input type="hidden" id="selectedAvatarColor" th:value="${user.avatarColor}"/>
                            </div>
                        </div>
                    </div>

                    <!-- Mot de passe -->
                    <div class="profile-section">
                        <div class="profile-section-header">
                            <h3><span>🔐</span> Sécurité</h3>
                        </div>
                        <div class="profile-section-body">
                            <div class="form-group">
                                <label>Mot de passe actuel</label>
                                <div class="password-wrapper">
                                    <input type="password" id="currentPassword" class="form-input"
                                           placeholder="••••••••"/>
                                    <button type="button" class="toggle-pw" onclick="togglePw('currentPassword')">👁</button>
                                </div>
                            </div>
                            <div class="profile-form-row">
                                <div class="form-group">
                                    <label>Nouveau mot de passe</label>
                                    <div class="password-wrapper">
                                        <input type="password" id="newPassword" class="form-input"
                                               placeholder="Min. 6 caractères"/>
                                        <button type="button" class="toggle-pw" onclick="togglePw('newPassword')">👁</button>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Confirmer le nouveau mot de passe</label>
                                    <input type="password" id="confirmPassword" class="form-input"
                                           placeholder="Confirmer"/>
                                </div>
                            </div>
                            <div id="pwError" class="alert alert-error hidden"></div>
                            <button class="btn btn-primary" onclick="changePassword()">🔑 Modifier le mot de passe</button>
                        </div>
                    </div>

                    <!-- Activité récente -->
                    <div class="profile-section">
                        <div class="profile-section-header">
                            <h3><span>📈</span> Activité récente</h3>
                        </div>
                        <div class="profile-section-body">
                            <div class="activity-feed">
                                <div th:each="n : ${notifications}" class="activity-item">
                                    <div class="activity-dot"
                                         th:style="'background:' + (${!n.read} ? 'var(--primary)' : 'var(--border-md)')"></div>
                                    <div class="activity-text" th:text="${n.message}"></div>
                                    <div class="activity-time"
                                         th:text="${#temporals.format(n.createdAt, 'dd/MM HH:mm')}"></div>
                                </div>
                                <div th:if="${#lists.isEmpty(notifications)}" class="empty-state-sm">
                                    Aucune activité récente
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div><!-- /content-inner -->
    </div><!-- /main-content -->
</div><!-- /app-layout -->

<div th:replace="~{fragments/layout :: mobileNav}"></div>

<script th:src="@{/js/app.js}"></script>
<script>
function selectAvatarColor(el) {
    document.querySelectorAll('.avatar-color-opt').forEach(o => {
        o.classList.remove('selected');
        o.textContent = '';
    });
    el.classList.add('selected');
    el.textContent = '✓';
    const color = el.dataset.color;
    document.getElementById('selectedAvatarColor').value = color;
    document.getElementById('profileAvatarDisplay').style.background = color;
}

function saveProfile() {
    const data = {
        fullName: document.getElementById('profileFullName').value,
        email: document.getElementById('profileEmail').value,
        avatarColor: document.getElementById('selectedAvatarColor').value
    };
    fetch('/api/profile/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(res => {
        if (res.error) { showToast(res.error, 'error'); return; }
        showToast('Profil mis à jour !', 'success');
        if (res.fullName) document.getElementById('profileDisplayName').textContent = res.fullName;
        // Update sidebar avatar
        const avatars = document.querySelectorAll('.avatar');
        avatars.forEach(a => { if (res.avatarColor) a.style.background = res.avatarColor; });
    })
    .catch(() => showToast('Erreur réseau', 'error'));
}

function changePassword() {
    const cur = document.getElementById('currentPassword').value;
    const nw  = document.getElementById('newPassword').value;
    const conf = document.getElementById('confirmPassword').value;
    const errEl = document.getElementById('pwError');

    if (nw !== conf) {
        errEl.textContent = 'Les mots de passe ne correspondent pas';
        errEl.classList.remove('hidden');
        return;
    }
    errEl.classList.add('hidden');

    fetch('/api/profile/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ currentPassword: cur, newPassword: nw })
    })
    .then(r => r.json())
    .then(res => {
        if (res.error) {
            errEl.textContent = res.error;
            errEl.classList.remove('hidden');
        } else {
            showToast('Mot de passe modifié !', 'success');
            ['currentPassword','newPassword','confirmPassword'].forEach(id => {
                document.getElementById(id).value = '';
            });
        }
    })
    .catch(() => showToast('Erreur réseau', 'error'));
}

function togglePw(id) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
