<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/layout :: head('Connexion', 'auth.css')}"></head>
<body class="auth-body">

<div class="auth-container">
    <div class="auth-card">

        <!-- Retour à l'accueil -->
        <a href="/" class="auth-back-link">← Retour à l'accueil</a>

        <div class="auth-logo">
            <div class="auth-logo-icon">⚡</div>
            <h1>TaskFlow</h1>
            <p>Gestion de tâches collaborative</p>
        </div>

        <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
        <div th:if="${msg}"     class="alert alert-success" th:text="${msg}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Nom d'utilisateur ou email</label>
                <input type="text" id="username" name="username" class="form-input"
                       placeholder="Votre nom d'utilisateur" required autofocus/>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" class="form-input"
                           placeholder="••••••••" required/>
                    <button type="button" class="toggle-pw" onclick="togglePw('password')">👁</button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Se connecter</button>
        </form>

        <div class="auth-divider">ou</div>
        <p class="auth-link">Pas encore de compte ? <a th:href="@{/register}">Créer un compte</a></p>

    </div>
</div>

<button class="theme-toggle" onclick="toggleTheme()" id="themeToggle"
        style="position:fixed;bottom:20px;right:20px;z-index:999" title="Changer le thème">🌙</button>

<script th:src="@{/js/app.js}"></script>
<script>
function togglePw(id) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
