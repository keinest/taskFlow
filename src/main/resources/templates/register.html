<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/layout :: head('Inscription', 'auth.css')}"></head>
<body class="auth-body">

<div class="auth-container">
    <div class="auth-card">

        <!-- Retour à l'accueil -->
        <a href="/" class="auth-back-link">← Retour à l'accueil</a>

        <div class="auth-logo">
            <div class="auth-logo-icon">⚡</div>
            <h1>TaskFlow</h1>
            <p>Créer votre compte</p>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" th:field="*{fullName}" class="form-input" placeholder="Jean Dupont" required/>
                    <span class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
                </div>
                <div class="form-group">
                    <label>Nom d'utilisateur</label>
                    <input type="text" th:field="*{username}" class="form-input" placeholder="jeandupont" required/>
                    <span class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" class="form-input" placeholder="jean@exemple.com" required/>
                <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>
            <div class="form-group">
                <label>Mot de passe (min. 6 caractères)</label>
                <div class="password-wrapper">
                    <input type="password" th:field="*{password}" id="pw" class="form-input" placeholder="••••••••" required/>
                    <button type="button" class="toggle-pw" onclick="togglePw('pw')">👁</button>
                </div>
                <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>
            <div class="form-group">
                <label>Couleur d'avatar</label>
                <div class="color-picker">
                    <input type="hidden" th:field="*{avatarColor}" id="avatarColor" value="#0ea5e9"/>
                    <button type="button" class="color-swatch active" style="background:#0ea5e9" onclick="pickColor('#0ea5e9', this)"></button>
                    <button type="button" class="color-swatch" style="background:#06b6d4" onclick="pickColor('#06b6d4', this)"></button>
                    <button type="button" class="color-swatch" style="background:#3b82f6" onclick="pickColor('#3b82f6', this)"></button>
                    <button type="button" class="color-swatch" style="background:#8b5cf6" onclick="pickColor('#8b5cf6', this)"></button>
                    <button type="button" class="color-swatch" style="background:#ec4899" onclick="pickColor('#ec4899', this)"></button>
                    <button type="button" class="color-swatch" style="background:#10b981" onclick="pickColor('#10b981', this)"></button>
                    <button type="button" class="color-swatch" style="background:#f59e0b" onclick="pickColor('#f59e0b', this)"></button>
                    <button type="button" class="color-swatch" style="background:#ef4444" onclick="pickColor('#ef4444', this)"></button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Créer le compte</button>
        </form>

        <p class="auth-link">Déjà un compte ? <a th:href="@{/login}">Se connecter</a></p>
    </div>
</div>

<button class="theme-toggle" onclick="toggleTheme()" id="themeToggle"
        style="position:fixed;bottom:20px;right:20px;z-index:999">🌙</button>

<script th:src="@{/js/app.js}"></script>
<script>
function togglePw(id) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
}
function pickColor(color, el) {
    document.getElementById('avatarColor').value = color;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
}
</script>
</body>
</html>
