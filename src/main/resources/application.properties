# ============================================================
#  TASKFLOW — Configuration Production
# ============================================================

# === Application ============================================
spring.application.name=TaskFlow
server.port=8081
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# === Base de données H2 (fichier persistant) ================
# Pour passer à PostgreSQL, remplacer ce bloc par :
#   spring.datasource.url=jdbc:postgresql://localhost:5432/taskflow
#   spring.datasource.driver-class-name=org.postgresql.Driver
#   spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=jdbc:h2:file:./taskflow-db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=taskflow
spring.datasource.password=taskflow123

# Console H2 désactivée en production
spring.h2.console.enabled=false

# === JPA / Hibernate ========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# === Thymeleaf ==============================================
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8

# === Logging (production) ===================================
logging.level.root=WARN
logging.level.com.taskflow=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# === Upload fichiers ========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
